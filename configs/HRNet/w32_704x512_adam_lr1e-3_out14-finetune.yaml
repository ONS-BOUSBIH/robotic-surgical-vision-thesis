MODEL:
  INIT_WEIGHTS: true
  NAME: pose_hrnet
  NUM_JOINTS: 14
  PRETRAINED: 'models/pytorch/imagenet/hrnet_w32-36af842e.pth'
  TARGET_TYPE: gaussian
  IMAGE_SIZE:
  - 512
  - 704
  HEATMAP_SIZE:
  - 128
  - 176
  SIGMA: 5
  EXTRA:
    PRETRAINED_LAYERS:
    - 'conv1'
    - 'bn1'
    - 'conv2'
    - 'bn2'
    - 'layer1'
    - 'transition1'
    - 'stage2'
    - 'transition2'
    - 'stage3'
    - 'transition3'
    - 'stage4'
    FINAL_CONV_KERNEL: 1
    STAGE2:
      NUM_MODULES: 1
      NUM_BRANCHES: 2
      BLOCK: BASIC
      NUM_BLOCKS:
      - 4
      - 4
      NUM_CHANNELS:
      - 32
      - 64
      FUSE_METHOD: SUM
    STAGE3:
      NUM_MODULES: 4
      NUM_BRANCHES: 3
      BLOCK: BASIC
      NUM_BLOCKS:
      - 4
      - 4
      - 4
      NUM_CHANNELS:
      - 32
      - 64
      - 128
      FUSE_METHOD: SUM
    STAGE4:
      NUM_MODULES: 3
      NUM_BRANCHES: 4
      BLOCK: BASIC
      NUM_BLOCKS:
      - 4
      - 4
      - 4
      - 4
      NUM_CHANNELS:
      - 32
      - 64
      - 128
      - 256
      FUSE_METHOD: SUM
    
    ORIGINAL_PAPER_WEIGHTS: 'weights/original_weights/HRNet/pose_hrnet_w32_256x192.pth'
    ONE_INSTANCE: false
    TRAINING:
      BATCH_SIZE: 32
      NUM_EPOCHS:  200
      ALREADY_FINETUNED: false
      LR: 1e-3
      SAVE_INT: 100
      AUGMENTATION: true
    SAVE:
      EXPERIMENT_DIR: 'results/Keypoints_detection/training_results/HRNet_trainings/Experiment2'
    DATA:
      ROOT: 'data/SurgPose/SurgPose_for_HRNet/Extracted_left_right'

LOSS:
  USE_TARGET_WEIGHT: true
